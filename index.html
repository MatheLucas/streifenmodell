<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streifenmodell Visualisierung</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Streifenmodell Visualisierung</h1>

    <div class="input-section">
      <label for="equation">Gib die Gleichung ein:</label>
      <input type="text" id="equation" placeholder="z. B. 2x + 3 = 9">
      <button id="generate">Streifen erstellen</button>
    </div>

    <div id="strip-container">
      <h2>Visualisierung:</h2>
      <div id="strip-area">
        <div id="upper-strip-area"></div>
        <div id="lower-strip-area"></div>
      </div>
    </div>

    <div class="input-section">
      <label for="operation">Rechenfeld:</label>
      <input type="number" id="operation" placeholder="Zahl eingeben">
      <button id="apply-operation">Rechnen</button>
    </div>

    <div class="input-section">
      <label for="solution">Lösung für x:</label>
      <input type="number" id="solution" placeholder="Wert für x">
      <button id="check-solution">Lösung überprüfen</button>
    </div>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
